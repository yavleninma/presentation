# Project-scoped Codex settings for repeatable public no-auth UX QA.
# Keep sandbox conservative; escalate only when the local Next.js server cannot spawn inside the sandbox.

[windows]
sandbox = "workspace-write"

# Use an isolated Playwright browser so parallel Codex sessions do not fight over one shared profile.
[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--isolated"]
