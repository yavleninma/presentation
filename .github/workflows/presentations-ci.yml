name: Presentations web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: presentations-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: presentations-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # Production deploy on Vercel (only after verify passes; push to main only)
  deploy-vercel:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is missing or empty. This is a GitHub Actions secret (not Vercel env vars): Repo → Settings → Secrets and variables → Actions → create VERCEL_TOKEN at https://vercel.com/account/tokens"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Set GitHub secrets VERCEL_ORG_ID (Vercel team Settings → Team ID) and VERCEL_PROJECT_ID (Project → Settings → General → Project ID). Or run npx vercel link in presentations-frontend and copy orgId/projectId from .vercel/project.json. See README Deploy section."
            exit 1
          fi
          npx vercel@latest deploy --prod --non-interactive --token="$VERCEL_TOKEN"
