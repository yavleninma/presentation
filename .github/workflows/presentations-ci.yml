name: Presentation Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run verify

  smoke:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for smoke
        run: npx playwright install --with-deps chromium

      - name: Run mocked browser smoke
        run: npm run smoke

  deploy:
    needs: smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy production to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" --format json > vercel-deploy.json
          cat vercel-deploy.json

          deployment_url="$(node scripts/extract-vercel-deploy-url.mjs < vercel-deploy.json)"

          if [ -z "$deployment_url" ]; then
            echo "::error::Не удалось вытащить production deployment URL из JSON Vercel CLI."
            exit 1
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Point vnyatno.vercel.app to latest production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest alias set "${{ steps.deploy.outputs.deployment_url }}" vnyatno.vercel.app --token="${{ secrets.VERCEL_TOKEN }}"
